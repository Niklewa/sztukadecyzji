<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sztuka Decyzji</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
          Noto Sans, Helvetica, Arial, sans-serif;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #2f4f7f, #0b1020 65%);
        color: #f5f7ff;
      }

      main {
        width: min(680px, 92vw);
        padding: 2rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        backdrop-filter: blur(4px);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sztuka Decyzji</h1>
      <p>
        A simple one-page website ready for GitHub Pages hosting.
      </p>
    </main>
  </body>
</html>
